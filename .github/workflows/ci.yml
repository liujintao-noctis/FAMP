name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - ubuntu-22.04
          - windows-latest

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-binary-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-binary-cache,readwrite
      VCPKG_NUGET_FEED: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      VCPKG_NUGET_REPOSITORY: ${{ github.server_url }}/${{ github.repository }}
    strategy:
      fail-fast: false
      matrix:
        # Build complete matrix objects so a manual single-platform retry does
        # not re-add the other platform through a static `include` entry.
        include: ${{ fromJSON(inputs.platform == 'ubuntu-22.04' && '[{"os":"ubuntu-22.04","triplet":"x64-linux-release","build-type":"Release"}]' || inputs.platform == 'windows-latest' && '[{"os":"windows-latest","triplet":"x64-win-rel","build-type":"Release"}]' || '[{"os":"ubuntu-22.04","triplet":"x64-linux-release","build-type":"Release"},{"os":"windows-latest","triplet":"x64-win-rel","build-type":"Release"}]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Linux: install system deps ────────────────────────────
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf autoconf-archive automake libtool \
            pkg-config ninja-build \
            libgl1-mesa-dev libglew-dev libx11-dev libxext-dev libxtst-dev \
            libx11-xcb-dev libxcb1-dev libxcb-cursor-dev libxcb-glx0-dev \
            libxcb-render0-dev libxcb-shm0-dev libxcb-sync-dev \
            libxcb-util-dev libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-shape0-dev libxcb-xinput-dev libxcb-xkb-dev \
            libice-dev libsm-dev libxi-dev libxrender-dev \
            libxkbcommon-dev libxkbcommon-x11-dev

      # ── Setup vcpkg ───────────────────────────────────────────
      # vcpkg includes CMake and Ninja versions in package ABI decisions. Pin
      # both so weekly hosted-runner image updates do not invalidate Windows.
      - name: Pin Windows CMake and Ninja
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@e6906078ebd1ccb8ce51ab4626ac46a1b5a517e3
        with:
          cmakeVersion: 4.4.0
          ninjaVersion: 1.13.2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Keep the vcpkg root outside the longer repository checkout path so
          # Qt-generated object files stay comfortably below Windows MAX_PATH.
          vcpkgDirectory: ${{ runner.temp }}/vcpkg
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Restore vcpkg source downloads
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/vcpkg/downloads
          key: vcpkg-downloads-v2-${{ matrix.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'ci/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-downloads-v1-${{ matrix.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-

      - name: Detect runner image version
        id: runner-image
        shell: bash
        run: |
          if [ -z "${ImageVersion:-}" ]; then
            echo "ImageVersion is not set on this runner" >&2
            exit 1
          fi
          echo "version=${ImageVersion}" >> "${GITHUB_OUTPUT}"
          echo "Runner image version: ${ImageVersion}"

      - name: Restore vcpkg binary cache
        id: vcpkg-binary-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkg-v3-${{ matrix.os }}-${{ matrix.triplet }}-${{ steps.runner-image.outputs.version }}-${{ matrix.os == 'windows-latest' && 'cmake-4.4.0-ninja-1.13.2' || 'system-tools' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/*.cmake', 'ci/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-checkpoint-v1-${{ matrix.os }}-${{ matrix.triplet }}-${{ steps.runner-image.outputs.version }}-${{ matrix.os == 'windows-latest' && 'cmake-4.4.0-ninja-1.13.2' || 'system-tools' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/*.cmake', 'ci/vcpkg-overlay-ports/**') }}-
            vcpkg-v3-${{ matrix.os }}-${{ matrix.triplet }}-${{ steps.runner-image.outputs.version }}-${{ matrix.os == 'windows-latest' && 'cmake-4.4.0-ninja-1.13.2' || 'system-tools' }}-
            vcpkg-v3-${{ matrix.os }}-${{ matrix.triplet }}-${{ steps.runner-image.outputs.version }}-
            vcpkg-v2-${{ matrix.os }}-${{ matrix.triplet }}-${{ steps.runner-image.outputs.version }}-

      # GitHub Packages receives each completed Windows port immediately. This
      # preserves expensive Qt/VTK/PCL builds even when a later port fails.
      - name: Configure GitHub Packages vcpkg cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          FAMP_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $vcpkg = Join-Path '${{ runner.temp }}' 'vcpkg/vcpkg.exe'
          if (-not (Test-Path $vcpkg)) {
            throw "vcpkg executable was not found: $vcpkg"
          }

          $nugetOutput = & $vcpkg fetch nuget
          if ($LASTEXITCODE -ne 0) {
            throw 'vcpkg failed to acquire nuget.exe.'
          }
          $nuget = ($nugetOutput | Select-Object -Last 1).Trim()
          if (-not (Test-Path $nuget)) {
            throw "nuget.exe was not found: $nuget"
          }

          & $nuget sources add `
            -Source $env:VCPKG_NUGET_FEED `
            -StorePasswordInClearText `
            -Name FampGitHubPackages `
            -UserName '${{ github.repository_owner }}' `
            -Password $env:FAMP_GITHUB_TOKEN `
            -NonInteractive
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to add the authenticated GitHub Packages NuGet source.'
          }

          & $nuget setapikey $env:FAMP_GITHUB_TOKEN `
            -Source $env:VCPKG_NUGET_FEED `
            -NonInteractive
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to configure the GitHub Packages NuGet API key.'
          }

          $nugetMode = if ('${{ github.event_name }}' -eq 'pull_request') { 'read' } else { 'readwrite' }
          $binarySources = "clear;nuget,$env:VCPKG_NUGET_FEED,$nugetMode;nugettimeout,600;files,$env:VCPKG_BINARY_CACHE,readwrite"
          "VCPKG_BINARY_SOURCES=$binarySources" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Windows vcpkg binary cache uses GitHub Packages in $nugetMode mode with a file-cache fallback."

      # ── Configure ─────────────────────────────────────────────
      - name: Configure CMake (Linux, with download retry)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -uo pipefail
          for attempt in 1 2 3; do
            if cmake -S . -B build \
              -DCMAKE_TOOLCHAIN_FILE="${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
              -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
              -DVCPKG_HOST_TRIPLET=${{ matrix.triplet }} \
              -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
              -DBUILD_TESTING=ON; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            delay=$((attempt * 60))
            echo "CMake/vcpkg configure failed; retrying in ${delay} seconds (attempt $((attempt + 1))/3)."
            sleep "${delay}"
          done

      - name: Configure CMake (Windows, with download retry)
        id: configure-windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $arguments = @(
            '-S', '.',
            '-B', 'build',
            '-DCMAKE_TOOLCHAIN_FILE=${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake',
            '-DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}',
            '-DVCPKG_HOST_TRIPLET=${{ matrix.triplet }}',
            '-DVCPKG_OVERLAY_PORTS=${{ github.workspace }}/ci/vcpkg-overlay-ports',
            '-DCMAKE_BUILD_TYPE=${{ matrix.build-type }}',
            '-DBUILD_TESTING=ON'
          )
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            & cmake @arguments
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }
            $delay = $attempt * 60
            Write-Warning "CMake/vcpkg configure failed; retrying in $delay seconds (attempt $($attempt + 1)/3)."
            Start-Sleep -Seconds $delay
          }

      - name: Save vcpkg binary cache
        if: steps.vcpkg-binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: ${{ steps.vcpkg-binary-cache.outputs.cache-primary-key }}

      - name: Save failed Windows vcpkg checkpoint
        if: always() && runner.os == 'Windows' && steps.configure-windows.outcome == 'failure'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkg-checkpoint-v1-${{ matrix.os }}-${{ matrix.triplet }}-${{ steps.runner-image.outputs.version }}-${{ matrix.os == 'windows-latest' && 'cmake-4.4.0-ninja-1.13.2' || 'system-tools' }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/*.cmake', 'ci/vcpkg-overlay-ports/**') }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Verify release-only Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tripletDir = 'build/vcpkg_installed/${{ matrix.triplet }}'
          if (-not (Test-Path $tripletDir)) {
            throw "vcpkg triplet directory was not created: $tripletDir"
          }
          $debugDir = Join-Path $tripletDir 'debug'
          if (Test-Path $debugDir) {
            throw "Release-only triplet unexpectedly installed debug dependencies: $debugDir"
          }
          Write-Host "Verified release-only vcpkg installation at $tripletDir"

      # ── Build ─────────────────────────────────────────────────
      - name: Build
        # An argument-less --parallel lets the native tool choose its own
        # limit. With the modular Qt/VTK/PCL targets that can start dozens of
        # memory-heavy C++ compilations at once on a hosted runner.
        run: cmake --build build --config ${{ matrix.build-type }} --parallel 2

      # ── Test ──────────────────────────────────────────────────
      - name: Test
        shell: bash
        timeout-minutes: 10
        run: |
          if [ "${RUNNER_OS}" = "Windows" ]; then
            # gtest_discover_tests registers every case as a separate CTest
            # process. Starting the Qt/VTK/PCL-linked binary hundreds of times
            # dominates Windows runtime, so execute the same 313 cases in one
            # GoogleTest process while retaining per-case console reporting.
            plugin_dir="$(pwd)/build/vcpkg_installed/${{ matrix.triplet }}/Qt6/plugins/platforms"
            test -f "${plugin_dir}/qoffscreen.dll"
            export QT_QPA_PLATFORM=offscreen
            export QT_QPA_PLATFORM_PLUGIN_PATH="${plugin_dir}"
            cmake -E chdir "build/tests/${{ matrix.build-type }}" \
              ./famp_tests.exe --gtest_color=yes
          else
            ctest --test-dir build -C "${{ matrix.build-type }}" --output-on-failure
          fi

      # ── Package runnable artifacts ────────────────────────────
      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          package_root="package"
          package_dir="${package_root}/FAMP-linux"
          triplet_dir="build/vcpkg_installed/${{ matrix.triplet }}"

          rm -rf "${package_root}"
          mkdir -p \
            "${package_dir}/bin" \
            "${package_dir}/lib" \
            "${package_dir}/Qt6" \
            "${package_dir}/share/applications" \
            "${package_dir}/share/icons/hicolor/256x256/apps"

          cp build/bin/FAMP "${package_dir}/bin/"
          cp resources/famp.desktop "${package_dir}/share/applications/famp.desktop"
          cp resources/images/icon/famp_icon_256.png \
            "${package_dir}/share/icons/hicolor/256x256/apps/famp.png"
          cp -a "${triplet_dir}/lib/"*.so* "${package_dir}/lib/" || true

          if [ -d "${triplet_dir}/Qt6/plugins" ]; then
            cp -a "${triplet_dir}/Qt6/plugins" "${package_dir}/Qt6/"
          fi
          if [ -d "${triplet_dir}/share/proj" ]; then
            cp -a "${triplet_dir}/share/proj" "${package_dir}/share/"
          fi
          test -f "${package_dir}/share/proj/proj.db"

          cat > "${package_dir}/run-famp.sh" <<'EOF'
          #!/usr/bin/env bash
          set -e
          app_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="${app_dir}/lib:${LD_LIBRARY_PATH:-}"
          export QT_PLUGIN_PATH="${app_dir}/Qt6/plugins:${QT_PLUGIN_PATH:-}"
          exec "${app_dir}/bin/FAMP" "$@"
          EOF
          chmod +x "${package_dir}/run-famp.sh"

          tar -czf "${package_root}/FAMP-linux-${{ github.sha }}.tar.gz" -C "${package_root}" FAMP-linux

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageRoot = 'package'
          $packageDir = Join-Path $packageRoot 'FAMP-windows'
          $tripletDir = 'build/vcpkg_installed/${{ matrix.triplet }}'

          Remove-Item -Recurse -Force $packageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $packageDir | Out-Null

          $exeCandidates = @(
            'build/bin/Release/FAMP.exe',
            'build/bin/FAMP.exe'
          )
          $exe = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exe) {
            throw 'FAMP.exe was not found under build/bin'
          }
          Copy-Item $exe $packageDir

          $vcpkgBin = Join-Path $tripletDir 'bin'
          if (Test-Path $vcpkgBin) {
            Copy-Item "$vcpkgBin/*.dll" $packageDir -Force
            $env:PATH = "$vcpkgBin;$env:PATH"
          }

          $projData = Join-Path $tripletDir 'share/proj'
          if (-not (Test-Path (Join-Path $projData 'proj.db'))) {
            throw 'PROJ data directory is missing proj.db.'
          }
          $packagedProjData = Join-Path $packageDir 'share/proj'
          New-Item -ItemType Directory -Force $packagedProjData | Out-Null
          Copy-Item (Join-Path $projData '*') $packagedProjData -Recurse -Force

          $qtToolCandidates = @(
            "$tripletDir/tools/Qt6/bin/windeployqt.exe",
            "$tripletDir/tools/Qt6/bin/windeployqt6.exe",
            "$tripletDir/tools/qt6/bin/windeployqt.exe",
            "$tripletDir/tools/qt6/bin/windeployqt6.exe"
          )
          $windeployqt = $qtToolCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($windeployqt) {
            & $windeployqt --release --compiler-runtime --dir $packageDir (Join-Path $packageDir 'FAMP.exe')
          } else {
            throw 'windeployqt.exe was not found; Windows package would be missing Qt plugins and runtime files.'
          }

          $vswhereCandidates = @(
            (Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'),
            (Join-Path $env:ProgramFiles 'Microsoft Visual Studio\Installer\vswhere.exe')
          )
          $vswhere = $vswhereCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if ($vswhere) {
            $vsInstall = & $vswhere -latest -products '*' -requires Microsoft.VisualStudio.Component.VC.Redist.14.Latest -property installationPath
            if ($vsInstall) {
              $redistRoot = Join-Path $vsInstall 'VC\Redist\MSVC'
              if (Test-Path $redistRoot) {
                $crtDir = Get-ChildItem $redistRoot -Directory |
                  Sort-Object Name -Descending |
                  ForEach-Object {
                    Join-Path $_.FullName 'x64\Microsoft.VC143.CRT'
                    Join-Path $_.FullName 'x64\Microsoft.VC142.CRT'
                  } |
                  Where-Object { Test-Path $_ } |
                  Select-Object -First 1

                if ($crtDir) {
                  Remove-Item (Join-Path $packageDir 'VCRUNTIME*.dll') -Force -ErrorAction SilentlyContinue
                  Remove-Item (Join-Path $packageDir 'MSVCP*.dll') -Force -ErrorAction SilentlyContinue
                  Remove-Item (Join-Path $packageDir 'CONCRT*.dll') -Force -ErrorAction SilentlyContinue
                  Write-Host "Copying MSVC runtime from $crtDir"
                  Copy-Item (Join-Path $crtDir 'VCRUNTIME*.dll') $packageDir -Force -ErrorAction SilentlyContinue
                  Copy-Item (Join-Path $crtDir 'MSVCP*.dll') $packageDir -Force -ErrorAction SilentlyContinue
                  Copy-Item (Join-Path $crtDir 'CONCRT*.dll') $packageDir -Force -ErrorAction SilentlyContinue
                }
              }
            }
          }

          $requiredFiles = @(
            (Join-Path $packageDir 'FAMP.exe'),
            (Join-Path $packageDir 'platforms/qwindows.dll'),
            (Join-Path $packageDir 'share/proj/proj.db')
          )
          foreach ($requiredFile in $requiredFiles) {
            if (-not (Test-Path $requiredFile)) {
              throw "Required Windows package file is missing: $requiredFile"
            }
          }

          if (-not (Get-ChildItem $packageDir -Filter 'VCRUNTIME*.dll' -ErrorAction SilentlyContinue)) {
            throw 'MSVC runtime DLL VCRUNTIME*.dll was not packaged.'
          }
          if (-not (Get-ChildItem $packageDir -Filter 'MSVCP*.dll' -ErrorAction SilentlyContinue)) {
            throw 'MSVC runtime DLL MSVCP*.dll was not packaged.'
          }

          $mesaVersion = '26.1.3'
          $mesaArchiveName = "mesa3d-$mesaVersion-release-msvc.7z"
          $mesaUrl = "https://github.com/pal1000/mesa-dist-win/releases/download/$mesaVersion/$mesaArchiveName"
          $mesaArchive = Join-Path $env:RUNNER_TEMP $mesaArchiveName
          $mesaExtractDir = Join-Path $env:RUNNER_TEMP "mesa3d-$mesaVersion"
          $mesaSha256 = '6dd431f4620cea73970b13e3ffa94f721f2a3924306b8a4283c97648cdb6eb9c'

          Write-Host "Downloading Mesa3D OpenGL fallback from $mesaUrl"
          Invoke-WebRequest -Uri $mesaUrl -OutFile $mesaArchive
          $actualMesaSha256 = (Get-FileHash $mesaArchive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualMesaSha256 -ne $mesaSha256) {
            throw "Mesa3D archive SHA256 mismatch: expected $mesaSha256, got $actualMesaSha256"
          }

          $sevenZipCandidates = @(
            (Join-Path $env:ProgramFiles '7-Zip\7z.exe'),
            '7z'
          )
          $sevenZip = $sevenZipCandidates | Where-Object {
            if ($_ -eq '7z') {
              Get-Command $_ -ErrorAction SilentlyContinue
            } else {
              Test-Path $_
            }
          } | Select-Object -First 1
          if (-not $sevenZip) {
            throw '7z was not found; cannot extract Mesa3D fallback DLLs.'
          }

          Remove-Item -Recurse -Force $mesaExtractDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $mesaExtractDir | Out-Null
          & $sevenZip x $mesaArchive "-o$mesaExtractDir" 'x64/opengl32.dll' 'x64/libgallium_wgl.dll' -y | Write-Host

          foreach ($mesaDll in @('opengl32.dll', 'libgallium_wgl.dll')) {
            $mesaDllPath = Join-Path $mesaExtractDir "x64/$mesaDll"
            if (-not (Test-Path $mesaDllPath)) {
              throw "Mesa3D fallback DLL was not extracted: $mesaDll"
            }
            Copy-Item $mesaDllPath $packageDir -Force
          }

          @'
          @echo off
          setlocal
          pushd "%~dp0"
          set GALLIUM_DRIVER=llvmpipe
          start "" "%~dp0FAMP.exe"
          popd
          '@ | Set-Content -Path (Join-Path $packageDir 'run-famp.bat') -Encoding ascii

          @'
          @echo off
          setlocal
          pushd "%~dp0"
          set GALLIUM_DRIVER=llvmpipe
          set QT_DEBUG_PLUGINS=1
          echo Working directory: %CD% > famp-run.log
          echo Started: %DATE% %TIME% >> famp-run.log
          echo. >> famp-run.log
          FAMP.exe >> famp-run.log 2>&1
          echo. >> famp-run.log
          echo Exit code: %ERRORLEVEL% >> famp-run.log
          echo Finished: %DATE% %TIME% >> famp-run.log
          type famp-run.log
          echo.
          pause
          popd
          '@ | Set-Content -Path (Join-Path $packageDir 'run-famp-debug.bat') -Encoding ascii

          Compress-Archive -Path "$packageDir/*" -DestinationPath "$packageRoot/FAMP-windows-${{ github.sha }}.zip" -Force

      - name: Smoke test packaged Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $archive = Get-ChildItem 'package' -Filter 'FAMP-windows-*.zip' -File |
            Select-Object -First 1
          if (-not $archive) {
            throw 'Packaged Windows zip was not found.'
          }

          $smokeRoot = Join-Path $env:RUNNER_TEMP 'famp-windows-smoke'
          Remove-Item -Recurse -Force $smokeRoot -ErrorAction SilentlyContinue
          Expand-Archive -Path $archive.FullName -DestinationPath $smokeRoot -Force

          $requiredFiles = @(
            'FAMP.exe',
            'platforms/qwindows.dll',
            'opengl32.dll',
            'libgallium_wgl.dll',
            'run-famp.bat'
          )
          foreach ($requiredFile in $requiredFiles) {
            $requiredPath = Join-Path $smokeRoot $requiredFile
            if (-not (Test-Path $requiredPath)) {
              throw "Required file is missing from the Windows zip: $requiredFile"
            }
          }

          $stdoutLog = Join-Path $env:RUNNER_TEMP 'famp-smoke.stdout.log'
          $stderrLog = Join-Path $env:RUNNER_TEMP 'famp-smoke.stderr.log'
          Remove-Item $stdoutLog, $stderrLog -Force -ErrorAction SilentlyContinue
          $env:GALLIUM_DRIVER = 'llvmpipe'
          $process = $null

          try {
            $process = Start-Process `
              -FilePath (Join-Path $smokeRoot 'FAMP.exe') `
              -WorkingDirectory $smokeRoot `
              -RedirectStandardOutput $stdoutLog `
              -RedirectStandardError $stderrLog `
              -PassThru

            Start-Sleep -Seconds 15
            $process.Refresh()
            if ($process.HasExited) {
              if (Test-Path $stdoutLog) {
                Write-Host '--- FAMP stdout ---'
                Get-Content $stdoutLog | Write-Host
              }
              if (Test-Path $stderrLog) {
                Write-Host '--- FAMP stderr ---'
                Get-Content $stderrLog | Write-Host
              }
              throw "Packaged FAMP exited during startup with code $($process.ExitCode)."
            }

            Write-Host "Packaged FAMP remained running for 15 seconds (PID $($process.Id))."
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
              $process.WaitForExit()
            }
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: FAMP-${{ runner.os }}-${{ github.sha }}
          path: |
            package/*.tar.gz
            package/*.zip
          if-no-files-found: error
